name: Reusable clean-docs gate

on:
  workflow_call:
    inputs:
      package-ref:
        description: Immutable clean-docs commit or tag to install.
        required: true
        type: string

permissions:
  contents: read

jobs:
  clean-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned clean-docs
        run: >-
          python -m pip install
          "clean-docs @ git+https://github.com/owieschon/clean-docs.git@${{ inputs.package-ref }}"
      - run: clean-docs audit
      - run: clean-docs check
